<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>AgentX</title>
<style>
  :root {
    --bg: #0d0d10;
    --surface: #17171b;
    --surface2: #1f1f24;
    --border: #2a2a30;
    --text: #ececf0;
    --text-dim: #8e8ea0;
    --accent: #19c37d;
    --accent-dim: #19c37d22;
    --user-bubble: #2a2b32;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overscroll-behavior: none; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    display: flex;
    flex-direction: column;
    max-width: 600px;
    margin: 0 auto;
    height: 100dvh;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 12px 16px;
    padding-top: max(12px, env(safe-area-inset-top));
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    z-index: 10;
  }
  .header-mark {
    width: 30px; height: 30px;
    border-radius: 8px;
    background: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; color: #04140d; font-size: 15px;
    flex-shrink: 0;
  }
  .header-name { font-size: 15px; font-weight: 600; letter-spacing: -0.2px; }
  .header-sub { font-size: 11px; color: var(--text-dim); margin-top: 1px; }
  .header-sub.busy { color: var(--accent); }
  .header-sub .dot {
    display: inline-block; width: 5px; height: 5px; border-radius: 50%;
    background: var(--accent); margin-right: 4px;
  }
  .messages {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 18px 16px 8px;
  }
  .empty-state {
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    gap: 14px;
    padding: 0 24px;
  }
  .empty-mark {
    width: 56px; height: 56px;
    border-radius: 16px;
    background: linear-gradient(135deg, #19c37d, #0e8a58);
    display: flex; align-items: center; justify-content: center;
    font-weight: 700; font-size: 26px; color: #04140d;
  }
  .empty-title { font-size: 19px; font-weight: 600; }
  .empty-sub { font-size: 13.5px; color: var(--text-dim); line-height: 1.5; max-width: 280px; }
  .row { display: flex; gap: 10px; margin-bottom: 22px; align-items: flex-start; }
  .row.user { flex-direction: row-reverse; }
  .av {
    width: 26px; height: 26px; border-radius: 7px;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; flex-shrink: 0; margin-top: 2px; font-weight: 700;
  }
  .row.bot .av { background: var(--accent); color: #04140d; }
  .row.user .av { background: var(--surface2); border: 1px solid var(--border); }
  .col { display: flex; flex-direction: column; gap: 6px; max-width: 80%; }
  .row.user .col { align-items: flex-end; }
  .label { font-size: 11px; color: var(--text-dim); font-weight: 600; padding: 0 2px; }
  .bubble {
    font-size: 15px;
    line-height: 1.55;
    white-space: pre-wrap;
    word-wrap: break-word;
  }
  .row.bot .bubble { color: var(--text); }
  .row.user .bubble {
    background: var(--user-bubble);
    padding: 10px 14px;
    border-radius: 16px 16px 4px 16px;
  }
  .attached-img {
    max-width: 200px;
    border-radius: 12px;
    margin-bottom: 4px;
    border: 1px solid var(--border);
  }
  .speak-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text-dim);
    border-radius: 8px;
    padding: 4px 9px;
    font-size: 11px;
    cursor: pointer;
    margin-top: 2px;
    width: fit-content;
  }
  .speak-btn.speaking { color: var(--accent); border-color: var(--accent); }
  .typing-row { display: flex; gap: 4px; padding: 4px 0; }
  .typing-row span {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--text-dim);
    animation: bounce 1.3s ease-in-out infinite;
  }
  .typing-row span:nth-child(2) { animation-delay: 0.15s; }
  .typing-row span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes bounce { 0%, 80%, 100% { transform: translateY(0); opacity: 0.4; } 40% { transform: translateY(-5px); opacity: 1; } }
  .preview-strip {
    display: none;
    padding: 10px 16px 0;
    gap: 8px;
  }
  .preview-strip.show { display: flex; }
  .preview-item {
    position: relative;
    width: 56px; height: 56px;
    border-radius: 10px;
    overflow: hidden;
    border: 1px solid var(--border);
  }
  .preview-item img { width: 100%; height: 100%; object-fit: cover; }
  .preview-remove {
    position: absolute; top: 2px; right: 2px;
    width: 16px; height: 16px; border-radius: 50%;
    background: #000c; color: #fff;
    font-size: 10px; display: flex; align-items: center; justify-content: center;
    cursor: pointer;
  }
  .input-wrap {
    padding: 10px 12px;
    padding-bottom: max(10px, env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    background: var(--bg);
  }
  .input-pill {
    display: flex;
    align-items: flex-end;
    gap: 6px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 22px;
    padding: 6px 6px 6px 12px;
  }
  .input-pill.recording { border-color: #ef4444; }
  textarea#input {
    flex: 1;
    background: none;
    border: none;
    outline: none;
    color: var(--text);
    font-size: 15px;
    font-family: inherit;
    resize: none;
    max-height: 110px;
    line-height: 1.4;
    padding: 7px 0;
  }
  textarea#input::placeholder { color: var(--text-dim); }
  .icon-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: none;
    background: transparent;
    color: var(--text-dim);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background 0.15s, color 0.15s;
  }
  .icon-btn:active { background: var(--surface2); }
  .icon-btn.active { color: #ef4444; }
  .icon-btn svg { width: 19px; height: 19px; }
  .send-btn {
    width: 34px; height: 34px;
    border-radius: 50%;
    border: none;
    background: var(--accent);
    color: #04140d;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: opacity 0.15s, transform 0.1s;
  }
  .send-btn:disabled { opacity: 0.3; }
  .send-btn svg { width: 17px; height: 17px; }
  .quick-row {
    display: flex; gap: 7px; overflow-x: auto;
    padding: 0 16px 12px;
  }
  .quick-row::-webkit-scrollbar { display: none; }
  .quick-chip {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    border-radius: 16px;
    padding: 7px 13px;
    font-size: 12.5px;
    white-space: nowrap;
    cursor: pointer;
    flex-shrink: 0;
  }
  ::-webkit-scrollbar { width: 0; }
</style>
</head>
<body>

<div class="header">
  <div class="header-mark">X</div>
  <div>
    <div class="header-name">AgentX</div>
    <div class="header-sub" id="statusText">Ready</div>
  </div>
</div>

<div class="messages" id="messages">
  <div class="empty-state" id="emptyState">
    <div class="empty-mark">X</div>
    <div class="empty-title">AgentX</div>
    <div class="empty-sub">Type, speak, or send a photo. Ask anything, get things written, debug code, or just talk.</div>
  </div>
</div>

<div class="quick-row" id="quickRow">
  <button class="quick-chip" onclick="quickSend('Explain how neural networks work simply')">Explain something</button>
  <button class="quick-chip" onclick="quickSend('Write a short poem about the ocean')">Write a poem</button>
  <button class="quick-chip" onclick="quickSend('Write a JavaScript function to sort an array')">Write code</button>
  <button class="quick-chip" onclick="quickSend('Remember that my name is Ayaz')">Remember my name</button>
</div>

<div class="preview-strip" id="previewStrip"></div>

<div class="input-wrap">
  <div class="input-pill" id="inputPill">
    <button class="icon-btn" id="imgBtn" title="Add image">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="3"/><circle cx="9" cy="9" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
    </button>
    <input type="file" id="fileInput" accept="image/*" multiple style="display:none">
    <textarea id="input" placeholder="Message AgentX..." rows="1"></textarea>
    <button class="icon-btn" id="micBtn" title="Voice input">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/></svg>
    </button>
    <button class="send-btn" id="sendBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
    </button>
  </div>
</div>

<script>
const SYSTEM = `You are AgentX, a capable multi-purpose AI assistant. You can research topics, write content, write and debug code, hold things in memory across the conversation, and have natural conversation. Reply in Hinglish (mix of Hindi and English, written in Roman/English script) by default, matching the user's language style. Keep responses clear, direct, and conversational — no rigid templates, no excessive formatting, no markdown headers in chat. Just talk naturally like a sharp, helpful friend. Keep most responses concise unless the user clearly wants depth or detail.`;

let messages = [];
let attachedImages = [];
let loading = false;
let recognition = null;
let isRecording = false;
let currentUtterance = null;

const messagesEl = document.getElementById('messages');
const inputEl = document.getElementById('input');
const sendBtn = document.getElementById('sendBtn');
const micBtn = document.getElementById('micBtn');
const imgBtn = document.getElementById('imgBtn');
const fileInput = document.getElementById('fileInput');
const previewStrip = document.getElementById('previewStrip');
const inputPill = document.getElementById('inputPill');
const statusText = document.getElementById('statusText');
const emptyState = document.getElementById('emptyState');
const quickRow = document.getElementById('quickRow');

const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
if (SR) {
  recognition = new SR();
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.lang = 'hi-IN';

  recognition.onresult = (e) => {
    let text = '';
    for (let i = 0; i < e.results.length; i++) text += e.results[i][0].transcript;
    inputEl.value = text;
    autoResize();
  };
  recognition.onend = () => {
    isRecording = false;
    micBtn.classList.remove('active');
    inputPill.classList.remove('recording');
  };
  recognition.onerror = () => {
    isRecording = false;
    micBtn.classList.remove('active');
    inputPill.classList.remove('recording');
  };
} else {
  micBtn.style.display = 'none';
}

micBtn.addEventListener('click', () => {
  if (!recognition) return;
  if (isRecording) {
    recognition.stop();
  } else {
    isRecording = true;
    micBtn.classList.add('active');
    inputPill.classList.add('recording');
    recognition.start();
  }
});

function speak(text, btn) {
  if (currentUtterance) {
    window.speechSynthesis.cancel();
    document.querySelectorAll('.speak-btn.speaking').forEach(b => {
      b.classList.remove('speaking');
      b.querySelector('span').textContent = 'Listen';
    });
    if (currentUtterance.__btn === btn) { currentUtterance = null; return; }
  }
  const clean = text.replace(/[*_#`]/g, '');
  const utter = new SpeechSynthesisUtterance(clean);
  utter.lang = 'hi-IN';
  utter.rate = 1;
  utter.__btn = btn;
  utter.onend = () => {
    btn.classList.remove('speaking');
    btn.querySelector('span').textContent = 'Listen';
    currentUtterance = null;
  };
  currentUtterance = utter;
  btn.classList.add('speaking');
  btn.querySelector('span').textContent = 'Stop';
  window.speechSynthesis.speak(utter);
}

imgBtn.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => {
  const files = Array.from(e.target.files).slice(0, 4 - attachedImages.length);
  files.forEach(file => {
    const reader = new FileReader();
    reader.onload = () => {
      attachedImages.push({ name: file.name, dataUrl: reader.result });
      renderPreviews();
    };
    reader.readAsDataURL(file);
  });
  fileInput.value = '';
});

function renderPreviews() {
  previewStrip.innerHTML = '';
  if (attachedImages.length === 0) {
    previewStrip.classList.remove('show');
    return;
  }
  previewStrip.classList.add('show');
  attachedImages.forEach((img, i) => {
    const div = document.createElement('div');
    div.className = 'preview-item';
    div.innerHTML = `<img src="${img.dataUrl}"><div class="preview-remove" onclick="removeImg(${i})">×</div>`;
    previewStrip.appendChild(div);
  });
}
function removeImg(i) { attachedImages.splice(i, 1); renderPreviews(); }

function autoResize() {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 110) + 'px';
}
inputEl.addEventListener('input', autoResize);
inputEl.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); }
});
sendBtn.addEventListener('click', sendMsg);

function quickSend(text) { inputEl.value = text; sendMsg(); }

function hideEmpty() {
  if (emptyState) { emptyState.remove(); }
  quickRow.style.display = 'none';
}

function addUserMsg(text, images) {
  hideEmpty();
  const row = document.createElement('div');
  row.className = 'row user';
  let imgHtml = '';
  if (images && images.length) {
    imgHtml = images.map(img => `<img class="attached-img" src="${img.dataUrl}">`).join('');
  }
  row.innerHTML = `
    <div class="av">You</div>
    <div class="col">${imgHtml}<div class="bubble">${esc(text)}</div></div>
  `;
  messagesEl.appendChild(row);
  scrollDown();
}

function addBotMsg(text) {
  hideEmpty();
  const row = document.createElement('div');
  row.className = 'row bot';
  const id = 'm' + Date.now();
  row.innerHTML = `
    <div class="av">X</div>
    <div class="col">
      <div class="bubble" id="${id}">${esc(text)}</div>
      <button class="speak-btn" onclick="speak(document.getElementById('${id}').dataset.raw, this)">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 5L6 9H2v6h4l5 4V5z"/><path d="M19 5a9 9 0 0 1 0 14M15 8a5 5 0 0 1 0 8"/></svg>
        <span>Listen</span>
      </button>
    </div>
  `;
  messagesEl.appendChild(row);
  document.getElementById(id).dataset.raw = text;
  scrollDown();
}

function addTyping() {
  hideEmpty();
  const row = document.createElement('div');
  row.className = 'row bot';
  row.id = 'typingRow';
  row.innerHTML = `<div class="av">X</div><div class="col"><div class="typing-row"><span></span><span></span><span></span></div></div>`;
  messagesEl.appendChild(row);
  scrollDown();
}
function removeTyping() { const t = document.getElementById('typingRow'); if (t) t.remove(); }

function scrollDown() { messagesEl.scrollTop = messagesEl.scrollHeight; }
function esc(t) { return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

async function sendMsg() {
  const text = inputEl.value.trim();
  if ((!text && attachedImages.length === 0) || loading) return;

  const imgsForThisMsg = [...attachedImages];
  inputEl.value = '';
  autoResize();
  attachedImages = [];
  renderPreviews();

  addUserMsg(text || '(image sent)', imgsForThisMsg);

  let userContent;
  if (imgsForThisMsg.length > 0) {
    userContent = [
      { type: 'text', text: text || 'Describe this image and help with it.' },
      ...imgsForThisMsg.map(img => ({ type: 'image_url', image_url: { url: img.dataUrl } }))
    ];
  } else {
    userContent = text;
  }

  messages.push({ role: 'user', content: userContent });
  setLoading(true);
  addTyping();

  let attempts = 0, success = false;
  while (attempts < 3 && !success) {
    try {
      const res = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          messages: [{ role: 'system', content: SYSTEM }, ...messages.slice(-12)],
          hasImage: imgsForThisMsg.length > 0
        })
      });
      if (!res.ok) throw new Error('API error ' + res.status);
      const data = await res.json();
      const reply = data.choices[0].message.content;
      messages.push({ role: 'assistant', content: reply });
      removeTyping();
      addBotMsg(reply);
      success = true;
    } catch (err) {
      attempts++;
      if (attempts < 3) {
        statusText.textContent = 'Retrying...';
        statusText.classList.add('busy');
        await sleep(900 * attempts);
      } else {
        removeTyping();
        addBotMsg("Kuch problem aa gayi. Dobara try karo.");
      }
    }
  }
  setLoading(false);
}

function setLoading(v) {
  loading = v;
  sendBtn.disabled = false;
  if (v) {
    statusText.innerHTML = '<span class="dot"></span>Thinking...';
    statusText.classList.add('busy');
  } else {
    statusText.textContent = 'Ready';
    statusText.classList.remove('busy');
  }
}
</script>
</body>
</html>
