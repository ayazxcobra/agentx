<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>AgentX 🤖</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a14;
    color: #e2e8f0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    max-width: 480px;
    margin: 0 auto;
  }
  .header {
    background: linear-gradient(135deg, #0f0f1a, #1a0a2e);
    border-bottom: 1px solid #2d2d44;
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo {
    width: 38px; height: 38px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 20px;
  }
  .header-title { font-size: 17px; font-weight: 700; color: #fff; }
  .header-status { font-size: 11px; color: #6366f1; }
  .agents-row { margin-left: auto; display: flex; gap: 4px; }
  .messages {
    flex: 1; overflow-y: auto;
    padding: 16px 12px;
    display: flex; flex-direction: column; gap: 12px;
  }
  .msg { display: flex; gap: 8px; align-items: flex-start; }
  .msg.user { flex-direction: row-reverse; }
  .avatar {
    width: 32px; height: 32px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 15px; flex-shrink: 0;
  }
  .user .avatar { background: #6366f1; }
  .bot .avatar { background: #1e1e2e; border: 1px solid #2d2d44; }
  .bubble-wrap { max-width: 82%; display: flex; flex-direction: column; gap: 4px; }
  .agent-badge {
    font-size: 10px; font-weight: 700;
    background: #6366f122; color: #6366f1;
    border: 1px solid #6366f133;
    border-radius: 20px; padding: 2px 8px;
    display: inline-block; width: fit-content;
  }
  .bubble {
    padding: 10px 14px;
    border-radius: 4px 18px 18px 18px;
    font-size: 14px; line-height: 1.6;
    white-space: pre-wrap;
  }
  .user .bubble {
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border-radius: 18px 18px 4px 18px;
    color: #fff;
  }
  .bot .bubble { background: #1a1a2e; border: 1px solid #2d2d44; color: #e2e8f0; }
  .typing { display: flex; gap: 4px; padding: 8px 14px; }
  .dot {
    width: 7px; height: 7px;
    border-radius: 50%; background: #6366f1;
    animation: bounce 1.2s ease-in-out infinite;
  }
  .dot:nth-child(2) { animation-delay: 0.2s; }
  .dot:nth-child(3) { animation-delay: 0.4s; }
  @keyframes bounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-7px); }
  }
  .agent-status {
    display: none; padding: 5px 12px;
    background: #0f0f1a; border-top: 1px solid #1e1e2e;
    font-size: 10px; color: #6366f1;
    gap: 6px; align-items: center;
  }
  .agent-status.show { display: flex; }
  .pulse {
    width: 6px; height: 6px;
    background: #6366f1; border-radius: 50%;
    animation: pulse 1s ease infinite;
  }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
  .suggestions {
    display: flex; gap: 6px;
    overflow-x: auto; padding: 8px 12px;
    border-top: 1px solid #1e1e2e;
  }
  .suggestions::-webkit-scrollbar { display: none; }
  .sug-btn {
    background: #1a1a2e; border: 1px solid #2d2d44;
    color: #a0a0c0; border-radius: 20px;
    padding: 6px 12px; font-size: 11px;
    white-space: nowrap; cursor: pointer; flex-shrink: 0;
  }
  .input-area {
    padding: 10px 12px; background: #0f0f1a;
    border-top: 1px solid #1e1e2e;
    display: flex; gap: 8px; align-items: flex-end;
  }
  textarea {
    flex: 1; background: #1a1a2e; border: 1px solid #2d2d44;
    border-radius: 20px; padding: 10px 16px;
    color: #e2e8f0; font-size: 14px;
    resize: none; outline: none;
    max-height: 100px; line-height: 1.5; font-family: inherit;
  }
  textarea::placeholder { color: #555; }
  .send-btn {
    width: 42px; height: 42px; border-radius: 50%;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border: none; color: #fff; font-size: 18px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: opacity 0.2s;
  }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .retry-banner {
    display: none; background: #f59e0b22; color: #f59e0b;
    padding: 4px 16px; font-size: 11px;
    text-align: center; border-bottom: 1px solid #f59e0b33;
  }
  .retry-banner.show { display: block; }
  .modal {
    position: fixed; inset: 0; background: #000a;
    display: flex; align-items: center; justify-content: center;
    z-index: 100; padding: 20px;
  }
  .modal-box {
    background: #1a1a2e; border: 1px solid #2d2d44;
    border-radius: 16px; padding: 24px; width: 100%; max-width: 360px;
  }
  .modal-box h2 { font-size: 18px; margin-bottom: 8px; }
  .modal-box p { font-size: 13px; color: #888; margin-bottom: 16px; }
  .modal-box input {
    width: 100%; background: #0a0a14;
    border: 1px solid #2d2d44; border-radius: 10px;
    padding: 12px; color: #e2e8f0; font-size: 13px;
    outline: none; margin-bottom: 12px;
  }
  .modal-btn {
    width: 100%; padding: 12px;
    background: linear-gradient(135deg, #6366f1, #8b5cf6);
    border: none; border-radius: 10px;
    color: #fff; font-size: 15px; font-weight: 600; cursor: pointer;
  }
</style>
</head>
<body>
<div class="modal" id="modal">
  <div class="modal-box">
    <h2>🤖 AgentX Setup</h2>
    <p>Groq API key daalo — bilkul free hai!<br>console.groq.com se lo</p>
    <input type="password" id="apiKeyInput" placeholder="gsk_xxxxxxxxxxxxxxxx" />
    <button class="modal-btn" onclick="saveKey()">AgentX Shuru Karo! 🚀</button>
  </div>
</div>
<div class="header">
  <div class="logo">🤖</div>
  <div>
    <div class="header-title">AgentX</div>
    <div class="header-status" id="statusText">✅ Ready — All Agents Online</div>
  </div>
  <div class="agents-row">🎯🌐✅💻🧠✍️</div>
</div>
<div class="retry-banner" id="retryBanner"></div>
<div class="messages" id="messages"></div>
<div class="agent-status" id="agentStatus">
  <div class="pulse"></div>
  <span id="agentStatusText">Processing...</span>
</div>
<div class="suggestions" id="suggestions">
  <button class="sug-btn" onclick="sendSug('AgentX kya kya kar sakta hai?')">🤖 AgentX kya hai?</button>
  <button class="sug-btn" onclick="sendSug('Python kya hota hai samjhao')">🌐 Python samjhao</button>
  <button class="sug-btn" onclick="sendSug('Hello World code likho JavaScript mein')">💻 JS code likho</button>
  <button class="sug-btn" onclick="sendSug('Ek motivational poem likho')">✍️ Poem likho</button>
  <button class="sug-btn" onclick="sendSug('Mera naam Ayaz hai yaad rakho')">🧠 Naam yaad rakho</button>
</div>
<div class="input-area">
  <textarea id="input" placeholder="Koi bhi kaam batao..." rows="1"
    oninput="autoResize(this)"
    onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"
  ></textarea>
  <button class="send-btn" id="sendBtn" onclick="sendMsg()">➤</button>
</div>
<script>
const SYSTEM=`Tu AgentX hai — ek powerful multi-agent AI assistant.
Agents: 🎯 Orchestrator, 🌐 Research, ✅ Task, 💻 Code, 🧠 Memory, ✍️ Writer
Response format:
AGENT: [agent naam]
THINKING: [1 line]
RESULT: [pura jawab]
Hamesha Hinglish mein baat karo. Friendly aur helpful raho.`;
let messages=[],loading=false;
window.onload=()=>{
  const k=localStorage.getItem('groq_key');
  if(k){document.getElementById('modal').style.display='none';welcome();}
};
function saveKey(){
  const k=document.getElementById('apiKeyInput').value.trim();
  if(!k.startsWith('gsk_')){alert('Sahi Groq key daalo! gsk_ se shuru hoti hai.');return;}
  localStorage.setItem('groq_key',k);
  document.getElementById('modal').style.display='none';
  welcome();
}
function welcome(){
  addBotMsg("Namaste! 🙏 Main AgentX hoon!\n\nMain ye kar sakta hoon:\n🌐 Research & information\n✅ Tasks manage karna\n💻 Code likhna & fix karna\n🧠 Cheezein yaad rakhna\n✍️ Content & poetry likhna\n\nKya kaam hai aaj? 😊","🎯 Orchestrator");
}
function detectAgent(t){
  if(/code|program|bug|fix|script|html|css|js|python/i.test(t))return"💻 Code Agent";
  if(/task|todo|list|reminder/i.test(t))return"✅ Task Agent";
  if(/yaad|remember|memory|naam/i.test(t))return"🧠 Memory Agent";
  if(/likho|write|poem|story|email/i.test(t))return"✍️ Writer Agent";
  if(/kya hai|explain|samjhao|research/i.test(t))return"🌐 Research Agent";
  return"🎯 Orchestrator";
}
function addUserMsg(text){
  messages.push({role:'user',content:text});
  const d=document.createElement('div');
  d.className='msg user';
  d.innerHTML=`<div class="avatar">👤</div><div class="bubble-wrap"><div class="bubble">${esc(text)}</div></div>`;
  document.getElementById('messages').appendChild(d);
  document.getElementById('suggestions').style.display='none';
  scrollDown();
}
function addBotMsg(text,agent){
  messages.push({role:'assistant',content:text});
  const d=document.createElement('div');
  d.className='msg bot';
  d.innerHTML=`<div class="avatar">🤖</div><div class="bubble-wrap"><div class="agent-badge">${agent||'🎯 Orchestrator'}</div><div class="bubble">${esc(text)}</div></div>`;
  document.getElementById('messages').appendChild(d);
  scrollDown();
}
function addTyping(){
  const d=document.createElement('div');
  d.className='msg bot';d.id='typing';
  d.innerHTML=`<div class="avatar">🤖</div><div class="bubble-wrap"><div class="bubble"><div class="typing"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div></div>`;
  document.getElementById('messages').appendChild(d);scrollDown();
}
function removeTyping(){const t=document.getElementById('typing');if(t)t.remove();}
function parseRes(text){
  const a=text.match(/AGENT:\s*(.+)/i);
  const r=text.match(/RESULT:\s*([\s\S]+)/i);
  return{agent:a?.[1]?.trim()||'Orchestrator',result:r?.[1]?.trim()||text};
}
async function sendMsg(){
  const inp=document.getElementById('input');
  const text=inp.value.trim();
  if(!text||loading)return;
  const k=localStorage.getItem('groq_key');
  if(!k){document.getElementById('modal').style.display='flex';return;}
  inp.value='';inp.style.height='auto';
  addUserMsg(text);setLoading(true);
  const agent=detectAgent(text);
  showStatus(agent+' kaam kar raha hai...');
  addTyping();
  let attempts=0,success=false;
  while(attempts<3&&!success){
    try{
      const res=await fetch('https://api.groq.com/openai/v1/chat/completions',{
        method:'POST',
        headers:{'Content-Type':'application/json','Authorization':`Bearer ${k}`},
        body:JSON.stringify({
          model:'llama-3.3-70b-versatile',
          max_tokens:1024,
          messages:[{role:'system',content:SYSTEM},...messages.slice(-10)]
        })
      });
      if(!res.ok)throw new Error(res.status);
      const data=await res.json();
      const parsed=parseRes(data.choices[0].message.content);
      removeTyping();
      addBotMsg(parsed.result,parsed.agent);
      success=true;
      hideBanner();
    }catch(err){
      attempts++;
      if(attempts<3){showBanner(`🔄 Retry ${attempts}/3...`);await sleep(1000*attempts);}
      else{removeTyping();addBotMsg('❌ Error aaya. Dobara try karo!','🎯 Orchestrator');hideBanner();}
    }
  }
  setLoading(false);hideStatus();
}
function sendSug(t){document.getElementById('input').value=t;sendMsg();}
function setLoading(v){
  loading=v;
  document.getElementById('sendBtn').disabled=v;
  document.getElementById('statusText').textContent=v?'⚡ Kaam ho raha hai...':'✅ Ready — All Agents Online';
}
function showStatus(t){document.getElementById('agentStatusText').textContent=t;document.getElementById('agentStatus').classList.add('show');}
function hideStatus(){document.getElementById('agentStatus').classList.remove('show');}
function showBanner(t){const b=document.getElementById('retryBanner');b.textContent=t;b.classList.add('show');}
function hideBanner(){document.getElementById('retryBanner').classList.remove('show');}
function scrollDown(){const m=document.getElementById('messages');m.scrollTop=m.scrollHeight;}
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}
function esc(t){return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');}
function sleep(ms){return new Promise(r=>setTimeout(r,ms));}
</script>
</body>
  </html>
